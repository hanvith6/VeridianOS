[build]
target = "riscv64gc-unknown-none-elf"

[target.riscv64gc-unknown-none-elf]
runner = """qemu-system-riscv64 \
    -machine virt \
    -nographic \
    -serial mon:stdio \
    -bios default \
    -smp 4 \
    -device virtio-net-device \
    -netdev user,id=net0 \
    -drive id=hd0,file=disk.img,format=raw,if=none \
    -device virtio-blk-device,drive=hd0 \
    -kernel"""

rustflags = [
    "-C", "target-feature=-relax"
]
