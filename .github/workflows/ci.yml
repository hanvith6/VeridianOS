name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always

# Minimum required permissions — no write access to repo contents or PRs.
permissions:
  contents: read

jobs:
  build-and-lint:
    name: Build · Clippy · Fmt
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        # Pinned to commit SHA — prevents tag-mutable supply chain attacks.
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Rust toolchain
        # Pinned to commit SHA.
        uses: dtolnay/rust-toolchain@b3b07ba8b418998c39fb20f53e8b695cdcc8de1b # nightly-2026-05-22
        with:
          toolchain: nightly-2026-05-22
          targets: riscv64gc-unknown-none-elf
          components: rustfmt, clippy, rust-src, llvm-tools-preview

      - name: Cache Cargo registry
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Build workspace
        run: cargo build --workspace --target riscv64gc-unknown-none-elf

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --target riscv64gc-unknown-none-elf -- -D warnings

  # QEMU smoke test requires self-hosted runner with qemu-system-riscv64.
  # Enable when a self-hosted runner is available (see docs/INDEX.md for setup).
